name: uog_navigetor
description: A campus navigator app for University of Gondar
publish_to: 'none'
version: 1.0.0
environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  url_launcher: ^6.1.7
  http: ^0.13.6
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  flutter_blue_plus: ^1.31.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
